<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Reciclaje cercano</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar bg-dark text-white p-3">
  <a href="dashboard.html" class="btn btn-light">⬅ Volver</a>
  <span>♻ Punto de reciclaje cercano</span>
</nav>

<div class="container mt-4">

  <button class="btn btn-success" onclick="geo()">
    Detectar ubicación
  </button>

  <div id="out" class="mt-3"></div>

</div>

<script>
function geo() {
  navigator.geolocation.getCurrentPosition((pos) => {
    document.getElementById("out").innerHTML =
      "Lat: " + pos.coords.latitude +
      "<br>Lng: " + pos.coords.longitude;
  });
}
</script>

</body>
</html>
