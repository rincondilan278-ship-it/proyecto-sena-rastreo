<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Reportes de desempeño</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

  <a href="dashboard.html" class="btn btn-dark">⬅ Volver</a>

  <h3>📊 Reportes de desempeño</h3>

  <div class="card p-3">
    <input id="camion" class="form-control mb-2" placeholder="Camión">
    <input id="viajes" type="number" class="form-control mb-2" placeholder="Viajes realizados">
    <input id="retrasos" type="number" class="form-control mb-2" placeholder="Retrasos">
    <button class="btn btn-primary" onclick="agregar()">Generar reporte</button>
  </div>

  <div id="resultados" class="mt-3"></div>
  
</div>

<script>
let reportes = [];

function agregar() {
  let eficiencia = (viajes.value - retrasos.value) / viajes.value * 100;

  reportes.push({
    camion: camion.value,
    eficiencia: eficiencia.toFixed(1)
  });

  render();
}

function render() {
  resultados.innerHTML = "";

  reportes.forEach(r => {
    resultados.innerHTML += `
      <div class="card p-2 mb-2">
        🚍 ${r.camion} - eficiencia: ${r.eficiencia}%
      </div>
    `;
  });
}
</script>

</body>
</html>
