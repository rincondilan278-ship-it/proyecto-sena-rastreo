<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Configuración del sistema</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">

  <a href="dashboard.html" class="btn btn-dark">⬅ Volver</a>
  <h3 class="mt-3">⚙ Configuración del sistema</h3>

  <!-- MODO SISTEMA -->
  <div class="card p-3 mb-3">
    <h5>🔧 Estado del sistema</h5>

    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" id="modoMantenimiento">
      <label class="form-check-label">Modo mantenimiento</label>
    </div>

    <button class="btn btn-primary mt-2" onclick="guardarEstado()">
      Guardar estado
    </button>

    <div id="estadoSistema" class="mt-2 text-success"></div>
  </div>

  <!-- CONFIG CAMIONES -->
  <div class="card p-3 mb-3">
    <h5>🚍 Configuración de camiones</h5>
    <input id="capacidadMax" class="form-control mb-2" placeholder="Capacidad máxima por camión">
    <input id="tiempoActualizacion" class="form-control mb-2" placeholder="Tiempo de actualización (segundos)">
    <button class="btn btn-success" onclick="guardarCamiones()">
      Guardar configuración
    </button>
    <div id="configCamiones" class="mt-2"></div>
  </div>
  
  <!-- NOTIFICACIONES -->
  <div class="card p-3 mb-3">
    <h5>📢 Configuración de notificaciones</h5>

    <select id="frecuencia" class="form-control mb-2">
      <option>Inmediata</option>
      <option>Cada 5 min</option>
      <option>Cada hora</option>
    </select>

    <button class="btn btn-warning" onclick="guardarNotif()">
      Guardar configuración
    </button>

    <div id="configNotif" class="mt-2"></div>
  </div>

  <!-- MODULOS -->
  <div class="card p-3 mb-3">
    <h5>🧩 Módulos del sistema</h5>

    <div class="form-check">
      <input class="form-check-input" type="checkbox" checked id="modMapa">
      <label>Mapa de camiones</label>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="checkbox" checked id="modReportes">
      <label>Reportes ciudadanos</label>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="checkbox" checked id="modNotificaciones">
      <label>Notificaciones</label>
    </div>

    <button class="btn btn-danger mt-2" onclick="guardarModulos()">
      Aplicar cambios
    </button>

    <div id="modEstado" class="mt-2"></div>
  </div>

</div>

<script>

// 🔧 Estado del sistema
function guardarEstado() {
  let estado = document.getElementById("modoMantenimiento").checked;

  estadoSistema.innerHTML = estado
    ? "⚠ Sistema en MANTENIMIENTO"
    : "🟢 Sistema activo";
}

// 🚍 Config camiones
function guardarCamiones() {
  configCamiones.innerHTML = `
    ✔ Capacidad máxima: ${capacidadMax.value} pasajeros<br>
    ✔ Actualización cada: ${tiempoActualizacion.value} segundos
  `;
}

// 📢 Notificaciones
function guardarNotif() {
  configNotif.innerHTML = `
    ✔ Frecuencia: ${frecuencia.value}
  `;
}

// 🧩 Módulos
function guardarModulos() {

  let mapa = modMapa.checked ? "Activo" : "Desactivado";
  let rep = modReportes.checked ? "Activo" : "Desactivado";
  let notif = modNotificaciones.checked ? "Activo" : "Desactivado";

  modEstado.innerHTML = `
    🗺 Mapa: ${mapa}<br>
    📊 Reportes: ${rep}<br>
    📢 Notificaciones: ${notif}
  `;
}

</script>

</body>
</html>
