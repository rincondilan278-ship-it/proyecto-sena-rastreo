<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Alertas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">
  <a href="dashboard.html" class="btn btn-dark">⬅ Volver</a>
  <h3>🚨 Configuración de alertas</h3>
  <div class="card p-3">
    <input id="mensaje" class="form-control mb-2" placeholder="Mensaje de alerta">
    <select id="nivel" class="form-control mb-2">
      <option>informativa</option>
      <option>advertencia</option>
      <option>critica</option>
    </select>

    <button class="btn btn-danger" onclick="crearAlerta()">Activar alerta</button>
  </div>
  <div id="alertas" class="mt-3"></div>
</div>

<script>
let lista = [];

function crearAlerta() {
  lista.push({
    msg: mensaje.value,
    nivel: nivel.value
  });

  render();
}

function render() {
  alertas.innerHTML = "";

  lista.forEach(a => {
    let color =
      a.nivel === "critica" ? "danger" :
      a.nivel === "advertencia" ? "warning" : "info";

    alertas.innerHTML += `
      <div class="alert alert-${color}">
        ${a.msg}
      </div>
    `;
  });
}
</script>

</body>
</html>
